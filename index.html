<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BubbleSystems | Dev Hub</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 5vw; 
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: auto; }
        
        /* Product Card Style */
        .card { 
            border: 2px solid #33ddff; 
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 30px;
            background: #161b22;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { 
            border-color: #ffffff; 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(51, 221, 255, 0.1);
        }

        h1 { color: #33ddff; font-size: 2.5em; margin-bottom: 10px; }
        h2 { color: #ffffff; margin-top: 0; }
        p { color: #8b949e; }

        .btn {
            display: inline-block;
            background: #33ddff;
            color: #0d1117;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn:hover { background: #ffffff; }

        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .stable { background: #238636; color: white; }
        .beta { background: #d29922; color: black; }
        .dev { background: #8957e5; color: white; }
        
        footer { text-align: center; margin-top: 50px; font-size: 0.8em; color: #484f58; }
    </style>
</head>
